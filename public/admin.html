<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MedPlus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100">
    <!-- Navigation -->
    <nav class="bg-emerald-800 text-white shadow-lg">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <h1 class="text-xl font-bold">Med<span class="text-yellow-300">Plus</span> Admin</h1>
                <div class="flex items-center gap-4">
                    <span id="adminNameDisplay" class="font-semibold"></span>
                    <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded-lg hover:bg-red-600">
                        <i class="fas fa-sign-out-alt mr-2"></i>Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>
    
    <div class="container mx-auto px-4 py-8">
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow p-6">
                <p class="text-gray-500">Total Revenue</p>
                <p id="totalRevenue" class="text-2xl font-bold text-emerald-700">₹0</p>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <p class="text-gray-500">Total Orders</p>
                <p id="totalOrders" class="text-2xl font-bold text-blue-600">0</p>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <p class="text-gray-500">Customers</p>
                <p id="totalCustomers" class="text-2xl font-bold text-green-600">0</p>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <p class="text-gray-500">Medicines</p>
                <p id="totalMedicines" class="text-2xl font-bold text-purple-600">0</p>
            </div>
        </div>
        
        <!-- Add Medicine Form -->
        <div class="bg-white rounded-lg shadow p-6 mb-8">
            <h2 class="text-xl font-bold mb-4">Add New Medicine</h2>
            <form id="medicineForm" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="medName" placeholder="Medicine Name" required class="border p-2 rounded">
                <input type="text" id="medGeneric" placeholder="Generic Name" class="border p-2 rounded">
                <input type="text" id="medManufacturer" placeholder="Manufacturer" class="border p-2 rounded">
                <input type="number" id="medPrice" placeholder="Price" required step="0.01" class="border p-2 rounded">
                <select id="medCategory" required class="border p-2 rounded">
                    <option value="Pain Relief">Pain Relief</option>
                    <option value="Antibiotics">Antibiotics</option>
                    <option value="Vitamins">Vitamins</option>
                </select>
                <input type="number" id="medStock" placeholder="Stock" class="border p-2 rounded">
                <input type="text" id="medImage" placeholder="Image URL" class="border p-2 rounded md:col-span-2">
                <textarea id="medDesc" placeholder="Description" rows="2" class="border p-2 rounded md:col-span-3"></textarea>
                <button type="submit" class="bg-emerald-700 text-white py-2 rounded hover:bg-emerald-800 md:col-span-3">
                    Add Medicine
                </button>
            </form>
        </div>
        
        <!-- Medicines List -->
        <div class="bg-white rounded-lg shadow p-6 mb-8">
            <h2 class="text-xl font-bold mb-4">Medicines</h2>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="p-2 text-left">Name</th>
                            <th class="p-2 text-left">Category</th>
                            <th class="p-2 text-left">Price</th>
                            <th class="p-2 text-left">Stock</th>
                            <th class="p-2 text-left">Action</th>
                        </tr>
                    </thead>
                    <tbody id="medicinesTable"></tbody>
                </table>
            </div>
        </div>
        
        <!-- Orders List -->
        <div class="bg-white rounded-lg shadow p-6 mb-8">
            <h2 class="text-xl font-bold mb-4">Orders</h2>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="p-2 text-left">Order ID</th>
                            <th class="p-2 text-left">Customer</th>
                            <th class="p-2 text-left">Items</th>
                            <th class="p-2 text-left">Total</th>
                            <th class="p-2 text-left">Status</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTable"></tbody>
                </table>
            </div>
        </div>
        
        <!-- Customers List -->
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-xl font-bold mb-4">Customers</h2>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="p-2 text-left">Name</th>
                            <th class="p-2 text-left">Email</th>
                            <th class="p-2 text-left">Phone</th>
                            <th class="p-2 text-left">Joined</th>
                        </tr>
                    </thead>
                    <tbody id="customersTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-4 right-4 px-6 py-3 rounded-lg text-white transform translate-x-full transition-transform duration-300 z-50"></div>

    <script src="config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
