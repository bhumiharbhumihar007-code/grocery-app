<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | FreshMart</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-body">

    <div class="admin-grid">
        <aside class="sidebar">
            <div class="logo">Fresh<span>Mart</span> Admin</div>
            <nav class="admin-nav">
                <a href="#stats" class="active"><i class="fas fa-chart-line"></i> Dashboard</a>
                <a href="#inventory"><i class="fas fa-boxes"></i> Inventory</a>
                <a href="#orders"><i class="fas fa-shopping-bag"></i> Orders</a>
                <a href="index.html"><i class="fas fa-eye"></i> View Site</a>
                <button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </nav>
        </aside>

        <main class="main-content">
            <header class="admin-header">
                <h2>Admin Dashboard</h2>
                <div id="admin-name">Welcome, Admin</div>
            </header>

            <section id="stats" class="stats-container">
                <div class="stat-card">
                    <i class="fas fa-users"></i>
                    <div class="info">
                        <h3>Total Users</h3>
                        <h2 id="total-users">0</h2>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-box"></i>
                    <div class="info">
                        <h3>Products</h3>
                        <h2 id="total-products">0</h2>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-dollar-sign"></i>
                    <div class="info">
                        <h3>Total Revenue</h3>
                        <h2 id="total-revenue">$0</h2>
                    </div>
                </div>
            </section>

            <section id="inventory" class="admin-section card">
                <h3><i class="fas fa-plus-circle"></i> Add New Product</h3>
                <form id="add-product-form">
                    <div class="form-grid">
                        <input type="text" id="pName" placeholder="Product Name" required>
                        <input type="number" id="pPrice" placeholder="Price" required>
                        <select id="pCategory">
                            <option value="Vegetables">Vegetables</option>
                            <option value="Fruits">Fruits</option>
                            <option value="Dairy">Dairy</option>
                            <option value="Bakery">Bakery</option>
                        </select>
                        <input type="text" id="pImage" placeholder="Image URL (e.g. https://...)" required>
                    </div>
                    <textarea id="pDesc" placeholder="Product Description"></textarea>
                    <button type="submit" class="btn-submit">Add Product to Store</button>
                </form>
            </section>

            <section class="admin-section card">
                <h3>Current Inventory</h3>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Price</th>
                                <th>Category</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-table">
                            </tbody>
                    </table>
                </div>
            </section>

            <section id="orders" class="admin-section card">
                <h3>Recent Orders</h3>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Customer</th>
                                <th>Address</th>
                                <th>Items</th>
                                <th>Total</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="orders-table">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="admin-lock" class="admin-overlay">
        <div class="lock-box">
            <i class="fas fa-lock fa-3x"></i>
            <h2>Admin Access Required</h2>
            <input type="password" id="admin-pass" placeholder="Enter Admin Password">
            <button onclick="verifyAdmin()" class="btn-submit">Unlock</button>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
