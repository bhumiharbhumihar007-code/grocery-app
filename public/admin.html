<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FreshMart | Professional Admin Console</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        :root { --admin-green: #2ecc71; --admin-dark: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        .sidebar { width: 250px; height: 100vh; background: #2c3e50; color: white; position: fixed; padding: 20px; }
        .main-content { margin-left: 280px; padding: 30px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .stat-card { text-align: center; color: white; border-radius: 10px; padding: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:1000; display:flex; align-items:center; justify-content:center; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="card" style="width: 350px; text-align: center;">
        <h2>🔐 Admin Login</h2>
        <input type="password" id="adminPass" placeholder="Admin Secret Password">
        <button onclick="checkLogin()" style="width:100%; background:var(--admin-green); color:white; border:none; padding:10px; border-radius:5px;">Enter Dashboard</button>
    </div>
</div>

<div class="sidebar">
    <h2>FreshMart Admin</h2>
    <hr>
    <p>📊 Dashboard</p>
    <p>📦 Inventory</p>
    <p>🛒 Orders</p>
    <p>👥 Users</p>
</div>

<div class="main-content">
    <h1>🚀 Business Overview</h1>
    
    <div class="grid-3">
        <div class="stat-card" style="background: #3498db;"><h3>Total Revenue</h3><h2 id="totalRev">$0</h2></div>
        <div class="stat-card" style="background: var(--admin-green);"><h3>Orders</h3><h2 id="orderCount">0</h2></div>
        <div class="stat-card" style="background: #f1c40f;"><h3>Customers</h3><h2 id="userCount">0</h2></div>
    </div>

    <div class="card">
        <h3>Sales Analytics</h3>
        <div id="myChart" style="width:100%; max-width:800px; height:300px;"></div>
    </div>

    <div class="card">
        <h3>➕ Add New Product</h3>
        <form id="productForm" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <input type="text" id="pName" placeholder="Product Name" required>
            <input type="number" id="pPrice" placeholder="Price ($)" required>
            <input type="text" id="pImg" placeholder="Image URL (Unsplash link)" required>
            <select id="pCat">
                <option value="Fruits">Fruits</option>
                <option value="Vegetables">Vegetables</option>
                <option value="Dairy">Dairy</option>
            </select>
            <button type="submit" style="grid-column: span 2; background: var(--admin-dark); color:white; padding:12px; border:none; border-radius:5px;">Save Product to Database</button>
        </form>
    </div>

    <div class="card">
        <h3>📦 Inventory Items</h3>
        <table id="productTable">
            <thead><tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Action</th></tr></thead>
            <tbody id="pTableBody"></tbody>
        </table>
    </div>

    <div class="card">
        <h3>🛒 Recent Orders</h3>
        <table id="orderTable">
            <thead><tr><th>Customer</th><th>Items</th><th>Total</th><th>Date</th></tr></thead>
            <tbody id="oTableBody"></tbody>
        </table>
    </div>
</div>

<script src="admin.js"></script>
</body>
</html>
