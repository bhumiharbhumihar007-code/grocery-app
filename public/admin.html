<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | FreshMart</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
theme:{
extend:{
colors:{
sand:"#F5F2ED",
teal:"#004D4D",
copper:"#B87333",
sage:"#8A9A5B",
charcoal:"#2B2B2B"
}
}
}
}
</script>

</head>

<body class="bg-sand text-charcoal font-sans">

<div class="flex min-h-screen">

<!-- MOBILE MENU BUTTON -->

<button onclick="toggleSidebar()"
class="md:hidden fixed top-4 left-4 z-50 bg-teal text-white p-2 rounded">

<i class="fas fa-bars"></i>

</button>

<!-- SIDEBAR -->

<aside id="sidebar"
class="w-64 bg-teal text-white fixed md:static h-full transform -translate-x-full md:translate-x-0 transition-transform duration-300 flex flex-col">

<div class="p-6 text-2xl font-bold border-b border-teal-800">

<span class="text-sage">Fresh</span>Mart
<span class="text-sm text-sand">Admin</span>

</div>

<nav class="flex-1 p-4 space-y-2">

<a href="#stats"
class="flex items-center space-x-3 p-3 rounded-lg bg-sage">

<i class="fas fa-chart-line"></i>
<span>Dashboard</span>

</a>

<a href="#inventory"
class="flex items-center space-x-3 p-3 rounded-lg hover:bg-teal-700">

<i class="fas fa-boxes"></i>
<span>Inventory</span>

</a>

<a href="#orders"
class="flex items-center space-x-3 p-3 rounded-lg hover:bg-teal-700">

<i class="fas fa-shopping-bag"></i>
<span>Orders</span>

</a>

<a href="index.html"
class="flex items-center space-x-3 p-3 rounded-lg hover:bg-teal-700 border-t border-teal-800 mt-4">

<i class="fas fa-eye"></i>
<span>View Site</span>

</a>

</nav>

<div class="p-4 border-t border-teal-800">

<button onclick="logout()"
class="w-full bg-red-500 hover:bg-red-600 p-2 rounded">

Logout

</button>

</div>

</aside>

<!-- MAIN -->

<main class="flex-1 md:ml-0 p-4 md:p-6">

<header class="bg-white p-4 rounded shadow flex justify-between items-center">

<h1 class="text-xl font-bold text-teal">
Admin Dashboard
</h1>

<div class="flex items-center gap-2">

<i class="fas fa-user-shield text-teal"></i>
<span>Admin</span>

</div>

</header>

<div class="space-y-8 mt-6">

<!-- STATS -->

<section id="stats"
class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">

<div class="bg-white p-5 rounded shadow flex items-center gap-4">

<i class="fas fa-users text-2xl text-teal"></i>

<div>

<p class="text-gray-500 text-sm">
Users
</p>

<h2 id="total-users" class="text-xl font-bold">
0
</h2>

</div>

</div>

<div class="bg-white p-5 rounded shadow flex items-center gap-4">

<i class="fas fa-box text-2xl text-sage"></i>

<div>

<p class="text-gray-500 text-sm">
Products
</p>

<h2 id="total-products" class="text-xl font-bold">
0
</h2>

</div>

</div>

<div class="bg-white p-5 rounded shadow flex items-center gap-4">

<i class="fas fa-dollar-sign text-2xl text-copper"></i>

<div>

<p class="text-gray-500 text-sm">
Revenue
</p>

<h2 id="total-revenue" class="text-xl font-bold">
$0
</h2>

</div>

</div>

</section>

<!-- ADD PRODUCT -->

<section id="inventory"
class="bg-white rounded shadow p-6">

<h2 class="text-lg font-bold text-teal mb-4">
Add Product
</h2>

<form id="add-product-form"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">

<input type="text"
id="pName"
placeholder="Product Name"
class="border p-2 rounded"
required>

<input type="number"
id="pPrice"
placeholder="Price"
class="border p-2 rounded"
required>

<select id="pCategory"
class="border p-2 rounded">

<option>Fruits</option>
<option>Vegetables</option>
<option>Snacks</option>
<option>Beverages</option>

</select>

<input type="text"
id="pImage"
placeholder="Image URL"
class="border p-2 rounded">

<textarea id="pDesc"
placeholder="Description"
class="border p-2 rounded md:col-span-2 lg:col-span-4"></textarea>

<button
class="bg-teal text-white p-2 rounded hover:bg-teal-700 md:col-span-2 lg:col-span-1">

Add Product

</button>

</form>

</section>

<!-- INVENTORY TABLE -->

<section class="bg-white rounded shadow overflow-x-auto">

<h2 class="p-4 font-bold text-teal">
Inventory
</h2>

<table class="w-full text-left">

<thead class="bg-gray-100">

<tr>

<th class="p-3">Image</th>
<th class="p-3">Name</th>
<th class="p-3">Price</th>
<th class="p-3">Category</th>
<th class="p-3">Action</th>

</tr>

</thead>

<tbody id="inventory-table"></tbody>

</table>

</section>

<!-- ORDERS -->

<section id="orders"
class="bg-white rounded shadow overflow-x-auto">

<h2 class="p-4 font-bold text-teal">
Orders
</h2>

<table class="w-full text-left">

<thead class="bg-gray-100">

<tr>

<th class="p-3">Customer</th>
<th class="p-3">Address</th>
<th class="p-3">Items</th>
<th class="p-3">Total</th>
<th class="p-3">Status</th>

</tr>

</thead>

<tbody id="orders-table"></tbody>

</table>

</section>

</div>

</main>

</div>

<script src="admin.js"></script>

<script>

function toggleSidebar(){

const sidebar = document.getElementById("sidebar");

sidebar.classList.toggle("-translate-x-full");

}

</script>

</body>

</html>
