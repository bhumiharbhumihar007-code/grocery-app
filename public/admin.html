<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | MediCare Pharmacy</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
theme:{
extend:{
colors:{
sand:"#F5F2ED",
teal:"#004D4D",
copper:"#B87333",
sage:"#8A9A5B",
charcoal:"#2B2B2B"
}
}
}
}
</script>

</head>

<body class="bg-sand text-charcoal font-sans antialiased">

<div class="flex min-h-screen">

<!-- Sidebar -->

<aside class="w-64 bg-teal text-white flex-shrink-0 hidden md:flex flex-col">

<div class="p-6 text-2xl font-bold border-b border-teal-800">
<span class="text-sage">Medi</span>Care
<span class="text-sm text-sand">Admin</span>
</div>

<nav class="flex-1 p-4 space-y-2">

<a href="#stats" class="flex items-center space-x-3 p-3 rounded-lg bg-sage text-white">
<i class="fas fa-chart-line w-5"></i>
<span>Dashboard</span>
</a>

<a href="#inventory" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-teal-700 transition">
<i class="fas fa-boxes w-5"></i>
<span>Inventory</span>
</a>

<a href="#orders" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-teal-700 transition">
<i class="fas fa-shopping-bag w-5"></i>
<span>Orders</span>
</a>

<a href="index.html" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-teal-700 transition border-t border-teal-800 mt-4">
<i class="fas fa-eye w-5"></i>
<span>View Site</span>
</a>

</nav>

<div class="p-4 border-t border-teal-800">

<button onclick="logout()" class="w-full flex items-center justify-center space-x-2 bg-red-100 text-red-600 p-3 rounded-lg hover:bg-red-500 hover:text-white transition">

<i class="fas fa-sign-out-alt"></i>
<span>Logout</span>

</button>

</div>

</aside>

<!-- Main -->

<main class="flex-1 flex flex-col min-w-0">

<header class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-10">

<h2 class="text-xl font-bold text-teal">
Admin Control Center
</h2>

<div id="admin-name" class="flex items-center space-x-2 font-medium">

<div class="w-8 h-8 bg-sage text-white rounded-full flex items-center justify-center">

<i class="fas fa-user-shield"></i>

</div>

<span>Welcome, Admin</span>

</div>

</header>

<div class="p-6 space-y-8">

<!-- Stats -->

<section id="stats" class="grid grid-cols-1 md:grid-cols-3 gap-6">

<div class="bg-white p-6 rounded-xl shadow flex items-center space-x-4">

<div class="p-4 bg-teal text-white rounded-lg">
<i class="fas fa-users text-2xl"></i>
</div>

<div>
<p class="text-sm text-gray-500 uppercase font-semibold">
Total Users
</p>
<h2 id="total-users" class="text-2xl font-bold">0</h2>
</div>

</div>

<div class="bg-white p-6 rounded-xl shadow flex items-center space-x-4">

<div class="p-4 bg-sage text-white rounded-lg">
<i class="fas fa-box text-2xl"></i>
</div>

<div>
<p class="text-sm text-gray-500 uppercase font-semibold">
Products
</p>
<h2 id="total-products" class="text-2xl font-bold">0</h2>
</div>

</div>

<div class="bg-white p-6 rounded-xl shadow flex items-center space-x-4">

<div class="p-4 bg-copper text-white rounded-lg">
<i class="fas fa-dollar-sign text-2xl"></i>
</div>

<div>
<p class="text-sm text-gray-500 uppercase font-semibold">
Revenue
</p>
<h2 id="total-revenue" class="text-2xl font-bold">$0</h2>
</div>

</div>

</section>

<!-- Add Product -->

<section id="inventory" class="bg-white rounded-xl shadow overflow-hidden">

<div class="p-4 border-b bg-sand font-bold text-teal flex items-center space-x-2">

<i class="fas fa-plus-circle text-copper"></i>
<span>Add New Product</span>

</div>

<form id="add-product-form" class="p-6 space-y-4">

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">

<input type="text" id="pName" placeholder="Product Name"
class="border p-2 rounded-lg focus:ring-2 focus:ring-teal outline-none" required>

<input type="number" id="pPrice" placeholder="Price"
class="border p-2 rounded-lg focus:ring-2 focus:ring-teal outline-none" required>

<select id="pCategory"
class="border p-2 rounded-lg focus:ring-2 focus:ring-teal outline-none bg-white">

<option>Medicine</option>
<option>Vitamins</option>
<option>Personal Care</option>
<option>Medical Devices</option>

</select>

<input type="text" id="pImage" placeholder="Image URL"
class="border p-2 rounded-lg focus:ring-2 focus:ring-teal outline-none">

</div>

<textarea id="pDesc"
placeholder="Product Description"
class="w-full border p-2 rounded-lg focus:ring-2 focus:ring-teal outline-none h-24"></textarea>

<button type="submit"
class="bg-copper hover:bg-sage text-white px-6 py-2 rounded-lg font-bold transition">

Add Product

</button>

</form>

</section>

<!-- Inventory Table -->

<section class="bg-white rounded-xl shadow overflow-hidden">

<div class="p-4 border-b bg-sand font-bold text-teal">
Current Inventory
</div>

<div class="overflow-x-auto">

<table class="w-full text-left border-collapse">

<thead>

<tr class="bg-sand text-charcoal uppercase text-xs">

<th class="p-4">Image</th>
<th class="p-4">Name</th>
<th class="p-4">Price</th>
<th class="p-4">Category</th>
<th class="p-4">Action</th>

</tr>

</thead>

<tbody id="inventory-table" class="divide-y"></tbody>

</table>

</div>

</section>

<!-- Orders -->

<section id="orders" class="bg-white rounded-xl shadow overflow-hidden">

<div class="p-4 border-b bg-sand font-bold text-teal">
Recent Orders
</div>

<div class="overflow-x-auto">

<table class="w-full text-left border-collapse">

<thead>

<tr class="bg-sand text-charcoal uppercase text-xs">

<th class="p-4">Customer</th>
<th class="p-4">Address</th>
<th class="p-4">Items</th>
<th class="p-4">Total</th>
<th class="p-4">Status</th>

</tr>

</thead>

<tbody id="orders-table" class="divide-y"></tbody>

</table>

</div>

</section>

</div>

</main>

</div>

<script src="admin.js"></script>

</body>
</html>
