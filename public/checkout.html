<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - MedPlus</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="container mx-auto p-4 max-w-2xl">
        <h1 class="text-2xl font-bold text-[#004D4D] mb-6">Checkout</h1>
        
        <div class="bg-white rounded-lg shadow p-6 mb-4">
            <h2 class="font-bold mb-4">Order Summary</h2>
            <div id="orderItems"></div>
            <div class="border-t pt-4 mt-4">
                <p class="text-xl font-bold">Total: ₹<span id="orderTotal">0.00</span></p>
            </div>
        </div>
        
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="font-bold mb-4">Delivery Details</h2>
            <form id="checkoutForm">
                <input type="text" id="name" placeholder="Full Name" value="" class="w-full border p-3 rounded mb-3">
                <input type="email" id="email" placeholder="Email" value="" class="w-full border p-3 rounded mb-3">
                <input type="tel" id="phone" placeholder="Phone Number" class="w-full border p-3 rounded mb-3">
                <textarea id="address" placeholder="Delivery Address" rows="3" class="w-full border p-3 rounded mb-3"></textarea>
                
                <button type="submit" class="w-full bg-[#004D4D] text-white py-3 rounded-lg">
                    Place Order
                </button>
            </form>
        </div>
    </div>

    <script>
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        
        if (cart.length === 0) {
            window.location.href = "index.html";
        }
        
        // Show order items
        document.getElementById("orderItems").innerHTML = cart.map(item => `
            <div class="flex justify-between border-b py-2">
                <span>${item.name} x ${item.quantity}</span>
                <span>₹${(item.price * item.quantity).toFixed(2)}</span>
            </div>
        `).join('');
        
        const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        document.getElementById("orderTotal").textContent = total.toFixed(2);
        
        // Auto-fill user data
        document.getElementById("name").value = localStorage.getItem("userName") || "";
        document.getElementById("email").value = localStorage.getItem("userEmail") || "";
        
        // Submit order
        document.getElementById("checkoutForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const order = {
                userName: document.getElementById("name").value,
                userEmail: document.getElementById("email").value,
                userPhone: document.getElementById("phone").value,
                deliveryAddress: document.getElementById("address").value,
                items: cart.map(item => ({
                    medicineId: item.id,
                    name: item.name,
                    price: item.price,
                    quantity: item.quantity
                })),
                total: total
            };
            
            const res = await fetch("/order", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(order)
            });
            
            if (res.ok) {
                alert("Order placed successfully!");
                localStorage.removeItem("cart");
                window.location.href = "index.html";
            } else {
                alert("Order failed");
            }
        });
    </script>
</body>
</html>
