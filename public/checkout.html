<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - MedPlus</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="container mx-auto px-4 py-8 max-w-2xl">
        <h1 class="text-2xl font-bold text-emerald-700 mb-6">Checkout</h1>
        
        <div class="bg-white rounded-lg shadow p-6 mb-4">
            <h2 class="font-bold mb-4">Order Summary</h2>
            <div id="orderItems"></div>
            <div class="border-t pt-4 mt-4">
                <p class="text-xl font-bold">Total: ₹<span id="orderTotal">0.00</span></p>
            </div>
        </div>
        
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="font-bold mb-4">Delivery Details</h2>
            <form id="checkoutForm">
                <input type="text" id="name" placeholder="Full Name" class="w-full border p-3 rounded mb-3">
                <input type="email" id="email" placeholder="Email" class="w-full border p-3 rounded mb-3">
                <input type="tel" id="phone" placeholder="Phone" class="w-full border p-3 rounded mb-3">
                <textarea id="address" placeholder="Address" rows="3" class="w-full border p-3 rounded mb-3"></textarea>
                <button type="submit" class="w-full bg-emerald-700 text-white py-3 rounded-lg">
                    Place Order
                </button>
            </form>
        </div>
    </div>
    
    <!-- Toast -->
    <div id="toast" class="fixed bottom-4 right-4 px-6 py-3 rounded-lg text-white transform translate-x-full transition-transform duration-300 z-50"></div>

    <script src="config.js"></script>
    <script src="checkout.js"></script>
</body>
</html>
