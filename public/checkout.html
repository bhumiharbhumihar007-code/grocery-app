<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - MedPlus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow sticky top-0 z-40">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <h1 class="text-2xl font-bold text-emerald-700">Med<span class="text-amber-600">Plus</span></h1>
                <a href="index.html" class="text-emerald-700 hover:text-emerald-800">
                    <i class="fas fa-arrow-left mr-2"></i>Back to Store
                </a>
            </div>
        </div>
    </nav>
    
    <div class="container mx-auto px-4 py-8 max-w-3xl">
        <h1 class="text-2xl md:text-3xl font-bold text-emerald-700 mb-8">Checkout</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left Column - Cart Items -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-lg shadow p-6 mb-6">
                    <h2 class="text-xl font-bold mb-4">Your Items</h2>
                    <div id="orderItems" class="space-y-3 max-h-60 overflow-y-auto"></div>
                    
                    <div class="border-t mt-4 pt-4">
                        <div class="flex justify-between text-lg font-bold">
                            <span>Subtotal:</span>
                            <span id="subtotal" class="text-emerald-700">₹0.00</span>
                        </div>
                        <div class="flex justify-between text-sm text-gray-600 mt-2">
                            <span>Tax (5%):</span>
                            <span id="tax">₹0.00</span>
                        </div>
                        <div class="flex justify-between text-sm text-gray-600">
                            <span>Delivery:</span>
                            <span id="delivery">₹40.00</span>
                        </div>
                        <div class="flex justify-between text-xl font-bold mt-4 pt-4 border-t">
                            <span>Total:</span>
                            <span id="orderTotal" class="text-emerald-700">₹0.00</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Right Column - Delivery Form -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-lg shadow p-6 sticky top-24">
                    <h2 class="text-xl font-bold mb-4">Delivery Details</h2>
                    
                    <form id="checkoutForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Full Name *</label>
                            <input type="text" id="fullName" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Email *</label>
                            <input type="email" id="email" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Phone Number *</label>
                            <input type="tel" id="phone" required maxlength="10"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Delivery Address *</label>
                            <textarea id="address" rows="3" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600"></textarea>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Payment Method</label>
                            <select id="paymentMethod" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600">
                                <option value="cod">Cash on Delivery</option>
                                <option value="card">Credit/Debit Card</option>
                                <option value="upi">UPI (Google Pay/PhonePe)</option>
                            </select>
                        </div>
                        
                        <button type="submit" 
                            class="w-full bg-emerald-700 text-white py-4 rounded-lg font-bold text-lg hover:bg-emerald-800 transition">
                            Place Order
                        </button>
                    </form>
                    
                    <p class="text-xs text-gray-500 text-center mt-4">
                        <i class="fas fa-lock mr-1"></i> Your information is secure
                    </p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 px-6 py-3 rounded-lg text-white transform translate-x-full transition-transform duration-300 z-50"></div>
    
    <script src="checkout.js"></script>
</body>
</html>
