<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
theme: {
extend: {
colors: {
sand: "#F5F2ED",
tealMain: "#004D4D",
copper: "#B87333",
charcoal: "#2B2B2B"
}
}
}
}
</script>

</head>

<body class="bg-sand min-h-screen flex items-center justify-center">

<div class="bg-white shadow-lg rounded-xl p-8 w-full max-w-2xl">

<h1 class="text-2xl font-bold text-tealMain mb-6">
Checkout
</h1>


<!-- CART ITEMS -->
<div id="checkout-items" class="mb-6"></div>


<!-- TOTAL -->
<div class="flex justify-between text-xl font-bold mb-6">

<span>Total</span>

<span id="checkout-total" class="text-copper"></span>

</div>


<!-- FORM -->
<form id="checkout-form" class="space-y-4">

<input
id="custName"
placeholder="Full Name"
required
class="w-full border p-3 rounded"
/>

<input
id="custEmail"
placeholder="Email"
required
class="w-full border p-3 rounded"
/>

<input
id="custPhone"
placeholder="Phone"
required
class="w-full border p-3 rounded"
/>

<textarea
id="custAddress"
placeholder="Address"
required
class="w-full border p-3 rounded"
></textarea>

<button
type="submit"
class="w-full bg-tealMain text-white py-3 rounded hover:opacity-90">

Place Order

</button>

</form>

</div>

<script src="checkout.js"></script>

</body>
</html>
