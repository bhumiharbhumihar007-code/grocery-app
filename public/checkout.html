<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshMart | Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
        
        <div class="bg-green-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold flex items-center justify-center gap-2">
                <span>🚚</span> FreshMart Checkout
            </h1>
            <p class="text-green-100 mt-1">Almost there! Complete your details below.</p>
        </div>

        <div class="p-8">
            <div class="bg-green-50 border border-green-100 rounded-xl p-4 mb-8 flex justify-between items-center">
                <span class="text-gray-700 font-semibold uppercase tracking-wider text-sm">Order Total:</span>
                <span id="checkout-total" class="text-2xl font-black text-green-700">$0.00</span>
            </div>

            <form id="checkout-form" class="space-y-5">
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
                    <input type="text" id="custName" placeholder="John Doe" 
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all" required>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                        <input type="email" id="custEmail" placeholder="you@example.com" 
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Phone Number</label>
                        <input type="tel" id="custPhone" placeholder="9876543210" 
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Delivery Address</label>
                    <textarea id="custAddress" rows="3" placeholder="House No, Street Name, Landmark, City" 
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all resize-none" required></textarea>
                </div>

                <div class="flex items-start gap-3 p-3 bg-blue-50 text-blue-800 rounded-lg text-sm italic">
                    <span class="text-lg">ℹ️</span>
                    Currently, we only support **Cash on Delivery**. Please keep exact change ready for our rider.
                </div>
                
                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-green-200 transition-transform active:scale-95 flex items-center justify-center gap-2">
                    Place Order Now
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="cart.html" class="text-sm text-gray-500 hover:text-green-600 underline transition">Return to Shopping Cart</a>
            </div>
        </div>
    </div>

    <script src="checkout.js"></script>
</body>
</html>
