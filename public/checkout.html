<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FreshMart | Checkout</title>
    

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    
<div class="bg-green-500 text-white p-4 rounded-lg">
Admin Dashboard
</div>
<div class="checkout-container">
    <h2>🚚 Delivery Details</h2>
    <div class="order-summary">
        <h3>Order Total: <span id="checkout-total">$0</span></h3>
    </div>

    <form id="checkout-form">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="custName" placeholder="Your Name" required>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="custEmail" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="custPhone" placeholder="9876543210" required>
        </div>
        <div class="form-group">
            <label>Delivery Address</label>
            <textarea id="custAddress" rows="3" placeholder="House No, Street, City" required></textarea>
        </div>
        
        <button type="submit" class="btn-order">Place Order (Cash on Delivery)</button>
    </form>
</div>

<script src="checkout.js"></script>
</body>
</html>
