<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedPlus Pharmacy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow sticky top-0 z-40">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <h1 class="text-2xl font-bold text-emerald-700">Med<span class="text-amber-600">Plus</span></h1>
                <div class="flex items-center gap-4">
                    <span id="userGreeting" class="hidden md:inline text-gray-600"></span>
                    <button id="cartBtn" class="relative">
                        <i class="fas fa-shopping-cart text-2xl text-emerald-700"></i>
                        <span id="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 hidden items-center justify-center">0</span>
                    </button>
                    <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded-lg text-sm hover:bg-red-600">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Main Content -->
    <div class="container mx-auto px-4 py-8">
        <!-- Welcome Banner -->
        <div class="bg-gradient-to-r from-emerald-700 to-emerald-600 text-white rounded-lg shadow p-6 mb-8">
            <h2 class="text-2xl font-bold">Welcome, <span id="userName"></span>!</h2>
            <p class="text-emerald-100 mt-2">Browse our wide range of genuine medicines</p>
        </div>
        
        <!-- Search Section -->
        <div class="bg-white rounded-lg shadow p-6 mb-8">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1 relative">
                    <i class="fas fa-search absolute left-4 top-4 text-gray-400"></i>
                    <input type="text" id="searchInput" placeholder="Search medicines by name..."
                        class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600">
                </div>
                
                <select id="categoryFilter" class="md:w-64 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600">
                    <option value="all">All Categories</option>
                    <option value="Pain Relief">Pain Relief</option>
                    <option value="Antibiotics">Antibiotics</option>
                    <option value="Vitamins">Vitamins</option>
                    <option value="Cold & Flu">Cold & Flu</option>
                    <option value="Allergy">Allergy</option>
                </select>
            </div>
            
            <div class="mt-4 text-sm text-gray-500">
                <span id="resultsCount">0</span> medicines available
            </div>
        </div>
        
        <!-- Medicines Grid -->
        <div id="medicinesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </div>
    
    <!-- Cart Modal -->
    <div id="cartModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg max-w-lg w-full mx-4 max-h-[80vh] overflow-hidden">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold">Your Cart</h3>
                    <button id="closeCartBtn" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
                </div>
                
                <div id="cartItems" class="space-y-4 max-h-60 overflow-y-auto mb-4"></div>
                
                <div class="border-t pt-4">
                    <div class="flex justify-between text-lg font-bold mb-4">
                        <span>Total:</span>
                        <span id="cartTotal" class="text-emerald-700">₹0.00</span>
                    </div>
                    
                    <button id="checkoutBtn" class="w-full bg-emerald-700 text-white py-3 rounded-lg font-semibold hover:bg-emerald-800">
                        Proceed to Checkout
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 px-6 py-3 rounded-lg text-white transform translate-x-full transition-transform duration-300 z-50"></div>

    <!-- Link to JavaScript file -->
    <script src="index.js"></script>
</body>
</html>
