<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FreshMart | Online Store</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
theme: {
extend: {
colors: {
tealMain: "#004D4D",
sand: "#F5F2ED",
copper: "#B87333",
charcoal: "#2B2B2B"
}
}
}
}
</script>

<style>
html{scroll-behavior:smooth;}
body{font-family:Inter,system-ui;}
</style>

</head>

<body class="bg-sand text-charcoal">

<!-- NAVBAR -->
<nav class="bg-white shadow-md sticky top-0 z-50">

<div class="max-w-7xl mx-auto px-6">

<div class="flex justify-between items-center h-20">

<div class="cursor-pointer" onclick="window.location.href='index.html'">
<span class="text-3xl font-black text-tealMain">
Fresh<span class="text-copper">Mart</span>
</span>
</div>

<div class="hidden md:flex space-x-8 font-semibold">

<a href="index.html" class="text-tealMain">Home</a>

<a href="#products" class="hover:text-tealMain transition">
Shop
</a>

<a href="login.html" id="login-link" class="hover:text-tealMain">
Login
</a>

<span id="user-display"
class="hidden bg-sand px-3 py-1 rounded-full border">
</span>

</div>

<div class="relative cursor-pointer"
onclick="window.location.href='checkout.html'">

<div class="p-3 rounded-full bg-gray-100 hover:bg-teal-50 transition">

<i class="fas fa-shopping-cart text-xl"></i>

</div>

<span id="cart-count"
class="absolute -top-1 -right-1 bg-copper text-white text-xs px-2 py-0.5 rounded-full">
0
</span>

</div>

</div>
</div>

</nav>

<!-- HERO -->

<header class="bg-tealMain text-white">

<div class="max-w-7xl mx-auto px-6 py-24">

<div class="max-w-2xl">

<h1 class="text-5xl font-black leading-tight mb-6">

Premium Health Products  
<span class="text-orange-200">Delivered Fast.</span>

</h1>

<p class="text-lg opacity-90 mb-8">

A modern pharmacy experience.  
Quality medicine and wellness products delivered directly to your home.

</p>

<div class="flex gap-4">

<a href="#products"
class="bg-copper px-8 py-4 rounded-xl font-bold hover:opacity-90 transition">

Shop Now

</a>

<button
class="border border-white px-8 py-4 rounded-xl font-bold hover:bg-white/10">

Our Story

</button>

</div>

</div>

</div>

</header>


<!-- PRODUCTS -->

<main id="products" class="max-w-7xl mx-auto px-6 py-20">

<div class="flex justify-between items-center mb-12">

<div>

<h2 class="text-3xl font-black">Our Products</h2>

<div class="w-16 h-1 bg-copper mt-2 rounded"></div>

</div>

<div class="flex gap-2">

<button class="px-4 py-2 bg-tealMain text-white rounded-lg text-sm font-bold">
All
</button>

<button class="px-4 py-2 bg-white border rounded-lg text-sm hover:bg-sand">
Health
</button>

<button class="px-4 py-2 bg-white border rounded-lg text-sm hover:bg-sand">
Wellness
</button>

</div>

</div>

<!-- PRODUCT GRID -->

<div id="product-display"
class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">

<!-- products loaded from script.js -->

</div>

</main>


<!-- FOOTER -->

<footer class="bg-white border-t py-8">

<div class="text-center text-sm text-gray-500">

© 2026 FreshMart. All Rights Reserved.

</div>

</footer>


<script src="script.js"></script>

</body>
</html>
