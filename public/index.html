<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedPlus Pharmacy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-[#004D4D]">Med<span class="text-[#B87333]">Plus</span></h1>
            <div class="flex items-center gap-4">
                <span id="userDisplay"></span>
                <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-lg">Logout</button>
            </div>
        </div>
    </nav>
    
    <div class="container mx-auto p-4">
        <!-- Welcome -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-2xl">Welcome, <span id="userName" class="font-bold text-[#004D4D]"></span>!</h2>
        </div>
        
        <!-- Search -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <input type="text" id="searchInput" placeholder="Search medicines..." 
                class="w-full p-3 border rounded-lg">
        </div>
        
        <!-- Medicines Grid -->
        <div id="medicinesGrid" class="grid grid-cols-1 md:grid-cols-4 gap-4"></div>
    </div>
    
    <!-- Floating Cart -->
    <div class="fixed bottom-4 right-4">
        <button onclick="showCart()" class="bg-[#004D4D] text-white p-4 rounded-full shadow-lg relative">
            <i class="fas fa-shopping-cart text-2xl"></i>
            <span id="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs w-6 h-6 rounded-full flex items-center justify-center hidden">0</span>
        </button>
    </div>
    
    <!-- Cart Modal -->
    <div id="cartModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
        <div class="bg-white rounded-lg max-w-lg w-full p-6 max-h-[80vh] overflow-y-auto">
            <h2 class="text-xl font-bold mb-4">Your Cart</h2>
            <div id="cartItems"></div>
            <div class="border-t pt-4 mt-4">
                <p class="text-xl font-bold">Total: ₹<span id="cartTotal">0.00</span></p>
                <button onclick="checkout()" class="w-full bg-[#004D4D] text-white py-2 rounded-lg mt-4">
                    Proceed to Checkout
                </button>
            </div>
        </div>
    </div>

    <script>
        // Check login
        const userName = localStorage.getItem("userName");
        if (!userName) window.location.href = "login.html";
        
        document.getElementById("userName").textContent = userName;
        document.getElementById("userDisplay").textContent = "Hi, " + userName;
        
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let medicines = [];
        
        // Load medicines
        async function loadMedicines() {
            const res = await fetch("/medicines");
            medicines = await res.json();
            displayMedicines(medicines);
        }
        
        function displayMedicines(items) {
            document.getElementById("medicinesGrid").innerHTML = items.map(m => `
                <div class="bg-white rounded-lg shadow p-4">
                    <img src="${m.image}" class="w-full h-40 object-cover rounded">
                    <h3 class="font-bold mt-2">${m.name}</h3>
                    <p class="text-gray-600 text-sm">${m.genericName || ''}</p>
                    <p class="text-xl font-bold text-[#004D4D] mt-2">₹${m.price}</p>
                    <p class="text-sm text-gray-500">Stock: ${m.stock}</p>
                    <button onclick="addToCart('${m._id}', '${m.name}', ${m.price})" 
                        class="w-full bg-[#004D4D] text-white py-2 rounded-lg mt-3">
                        Add to Cart
                    </button>
                </div>
            `).join('');
        }
        
        // Search
        document.getElementById("searchInput").addEventListener("input", (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = medicines.filter(m => 
                m.name.toLowerCase().includes(term) || 
                (m.genericName && m.genericName.toLowerCase().includes(term))
            );
            displayMedicines(filtered);
        });
        
        // Cart functions
        function addToCart(id, name, price) {
            const existing = cart.find(item => item.id === id);
            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ id, name, price, quantity: 1 });
            }
            updateCart();
        }
        
        function updateCart() {
            localStorage.setItem("cart", JSON.stringify(cart));
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            document.getElementById("cartCount").textContent = count;
            document.getElementById("cartCount").style.display = count > 0 ? "flex" : "none";
            document.getElementById("cartTotal").textContent = total.toFixed(2);
            
            // Show cart items
            document.getElementById("cartItems").innerHTML = cart.map(item => `
                <div class="flex justify-between items-center border-b py-2">
                    <div>
                        <p class="font-semibold">${item.name}</p>
                        <p class="text-sm">Qty: ${item.quantity} x ₹${item.price}</p>
                    </div>
                    <p class="font-bold">₹${(item.price * item.quantity).toFixed(2)}</p>
                </div>
            `).join('');
        }
        
        function showCart() {
            document.getElementById("cartModal").classList.remove("hidden");
            document.getElementById("cartModal").classList.add("flex");
        }
        
        function checkout() {
            window.location.href = "checkout.html";
        }
        
        // Close modal when clicking outside
        document.getElementById("cartModal").addEventListener("click", (e) => {
            if (e.target === document.getElementById("cartModal")) {
                document.getElementById("cartModal").classList.add("hidden");
            }
        });
        
        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }
        
        // Initialize
        loadMedicines();
        updateCart();
    </script>
</body>
</html>
