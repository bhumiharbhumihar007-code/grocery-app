<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FreshMart</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>


<body class="bg-gray-100">


<!-- LOGIN PROTECTION -->

<script>

const user = localStorage.getItem("userEmail");

if(!user){

window.location.href = "login.html";

}

</script>



<!-- NAVBAR -->

<nav class="bg-teal-700 text-white p-4 shadow">

<div class="max-w-7xl mx-auto flex justify-between items-center">

<h1 class="text-xl md:text-2xl font-bold">
FreshMart
</h1>

<div class="flex items-center gap-6">

<a href="checkout.html" class="relative">

<i class="fas fa-shopping-cart text-xl"></i>

<span
id="cart-count"
class="absolute -top-2 -right-3 bg-red-500 text-xs px-2 py-1 rounded-full">

0

</span>

</a>

<button
onclick="logout()"
class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded">

Logout

</button>

</div>

</div>

</nav>



<!-- HERO SECTION -->

<section class="bg-white py-10 text-center px-4">

<h2 class="text-2xl md:text-3xl font-bold mb-3">

Welcome to FreshMart

</h2>

<p class="text-gray-600">

Best grocery and medicine products at affordable prices

</p>

</section>



<!-- PRODUCT SECTION -->

<section class="max-w-7xl mx-auto p-5">

<h2 class="text-2xl font-bold mb-6 text-center md:text-left">

Products

</h2>


<div
id="product-display"
class="grid gap-6
grid-cols-1
sm:grid-cols-2
md:grid-cols-3
lg:grid-cols-4">

<!-- Products will load here -->

</div>

</section>



<script src="script.js"></script>

</body>

</html>
