<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedPlus Pharmacy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow sticky top-0 z-40">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <h1 class="text-2xl font-bold text-emerald-700">Med<span class="text-amber-600">Plus</span></h1>
                <div class="flex items-center gap-4">
                    <span id="userGreeting" class="hidden md:inline text-gray-600"></span>
                    <button id="cartBtn" class="relative">
                        <i class="fas fa-shopping-cart text-2xl text-emerald-700"></i>
                        <span id="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 hidden items-center justify-center">0</span>
                    </button>
                    <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-lg text-sm hover:bg-red-600">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Main Content -->
    <div class="container mx-auto px-4 py-8">
        <!-- Welcome -->
        <div class="bg-gradient-to-r from-emerald-700 to-emerald-600 text-white rounded-lg shadow p-6 mb-8">
            <h2 class="text-2xl font-bold">Welcome, <span id="userName"></span>!</h2>
        </div>
        
        <!-- Search -->
        <div class="bg-white rounded-lg shadow p-6 mb-8">
            <input type="text" id="searchInput" placeholder="Search medicines..."
                class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600">
        </div>
        
        <!-- Medicines Grid -->
        <div id="medicinesGrid" class="grid grid-cols-1 md:grid-cols-4 gap-6"></div>
    </div>
    
    <!-- Cart Modal -->
    <div id="cartModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg max-w-lg w-full p-6 max-h-[80vh] overflow-y-auto">
            <h2 class="text-xl font-bold mb-4">Your Cart</h2>
            <div id="cartItems"></div>
            <div class="border-t pt-4 mt-4">
                <p class="text-xl font-bold">Total: ₹<span id="cartTotal">0.00</span></p>
                <button onclick="checkout()" class="w-full bg-emerald-700 text-white py-2 rounded-lg mt-4">
                    Checkout
                </button>
            </div>
        </div>
    </div>
    
    <!-- Toast -->
    <div id="toast" class="fixed bottom-4 right-4 px-6 py-3 rounded-lg text-white transform translate-x-full transition-transform duration-300 z-50"></div>

    <script src="config.js"></script>
    <script src="index.js"></script>
</body>
</html>
