<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MedPlus Pharmacy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-primary { background: linear-gradient(135deg, #004D4D 0%, #006666 100%); }
    </style>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-4xl w-full overflow-hidden">
            <div class="flex flex-col md:flex-row">
                <!-- Left Side -->
                <div class="bg-primary text-white p-8 md:w-1/2">
                    <h1 class="text-3xl font-bold mb-4">Med<span class="text-yellow-300">Plus</span></h1>
                    <p class="text-lg mb-6">Your Trusted Online Pharmacy</p>
                    <div class="space-y-4">
                        <div class="flex items-center gap-3">
                            <span class="w-8 h-8 bg-white bg-opacity-20 rounded-full flex items-center justify-center">✓</span>
                            <span>100% Genuine Medicines</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="w-8 h-8 bg-white bg-opacity-20 rounded-full flex items-center justify-center">✓</span>
                            <span>Free Home Delivery</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="w-8 h-8 bg-white bg-opacity-20 rounded-full flex items-center justify-center">✓</span>
                            <span>24/7 Customer Support</span>
                        </div>
                    </div>
                    <div class="mt-8 p-4 bg-white bg-opacity-10 rounded-lg">
                        <p class="text-sm">Admin Login:</p>
                        <p class="font-mono">admin@medplus.com / admin123</p>
                    </div>
                </div>
                
                <!-- Right Side - Login Form -->
                <div class="p-8 md:w-1/2">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6">Welcome Back</h2>
                    
                    <form id="loginForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                            <input type="email" id="email" value="admin@medplus.com" required
                                class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-[#004D4D]">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                            <input type="password" id="password" value="admin123" required
                                class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-[#004D4D]">
                        </div>
                        
                        <button type="submit" 
                            class="w-full bg-[#004D4D] text-white py-3 rounded-lg font-semibold hover:bg-[#006666]">
                            Login
                        </button>
                    </form>
                    
                    <p class="mt-4 text-center text-gray-600">
                        Don't have account? 
                        <a href="register.html" class="text-[#004D4D] font-semibold">Register</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const res = await fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    email: document.getElementById("email").value,
                    password: document.getElementById("password").value
                })
            });
            
            const data = await res.json();
            
            if (res.ok) {
                localStorage.setItem("userName", data.user.name);
                localStorage.setItem("userEmail", data.user.email);
                localStorage.setItem("userRole", data.user.role);
                localStorage.setItem("isLoggedIn", "true");
                
                alert("Login successful!");
                
                if (data.user.role === "admin") {
                    window.location.href = "admin.html";
                } else {
                    window.location.href = "index.html";
                }
            } else {
                alert(data.error || "Login failed");
            }
        });
    </script>
</body>
</html>
