<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FreshMart | Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<script>
tailwind.config = {
theme:{
extend:{
colors:{
tealMain:"#004D4D",
sand:"#F5F2ED",
copper:"#B87333",
charcoal:"#2B2B2B"
}
}
}
}
</script>

<style>
body{font-family:'Inter',sans-serif;}
</style>

</head>


<body class="bg-sand min-h-screen flex items-center justify-center p-4 text-charcoal">

<div class="max-w-md w-full bg-white rounded-3xl shadow-xl border border-gray-200 overflow-hidden">

<div class="h-2 bg-tealMain"></div>

<div class="p-8 md:p-10">

<!-- BRAND -->

<div class="text-center mb-8">

<h1 class="text-3xl font-black tracking-tight text-tealMain">

Fresh<span class="text-copper">Mart</span>

</h1>

<div class="mt-4">

<h2 class="text-2xl font-bold">
Welcome Back
</h2>

<p class="text-gray-500 mt-1">
Login to manage your orders
</p>

</div>

</div>


<!-- LOGIN FORM -->

<form id="login-form" class="space-y-5">

<div>

<label class="text-sm font-semibold ml-1">
Email Address
</label>

<input type="email"
id="logEmail"
placeholder="name@example.com"
class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-tealMain outline-none"
required>

</div>


<div>

<label class="text-sm font-semibold ml-1">
Password
</label>

<input type="password"
id="logPass"
placeholder="••••••••"
class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-tealMain outline-none"
required>

</div>


<button
type="submit"
class="w-full bg-copper hover:opacity-90 text-white font-bold py-4 rounded-xl transition active:scale-[0.98]">

Sign In

</button>

</form>


<!-- LINKS -->

<div class="mt-8 space-y-6 text-center">

<p>

New user?
<a href="register.html" class="text-tealMain font-bold hover:underline">
Create an account
</a>

</p>


<div class="pt-6 border-t">

<p class="text-sm text-gray-500 mb-3 font-semibold uppercase tracking-wider">

Staff Access

</p>

<a href="admin.html"
class="inline-flex items-center px-6 py-2 border rounded-full text-gray-600 font-semibold hover:border-tealMain hover:text-tealMain transition text-sm">

Admin Portal

</a>

</div>

</div>

</div>

</div>


<script>

document.getElementById('login-form').addEventListener('submit', async (e) => {

e.preventDefault();

const email=document.getElementById('logEmail').value;
const password=document.getElementById('logPass').value;

const btn=e.target.querySelector("button");

const originalText=btn.innerText;

btn.innerText="Authenticating...";
btn.disabled=true;

try{

const res=await fetch('/login',{

method:'POST',

headers:{'Content-Type':'application/json'},

body:JSON.stringify({email,password})

});

const data=await res.json();

if(res.ok){

localStorage.setItem("userName",data.userName);
localStorage.setItem("userEmail",data.userEmail);

window.location.href="index.html";

}else{

alert(data.error || "Invalid login credentials");

btn.innerText=originalText;
btn.disabled=false;

}

}catch(err){

console.error("Login Error:",err);

alert("Server connection failed!");

btn.innerText=originalText;
btn.disabled=false;

}

});

</script>

</body>
</html>
