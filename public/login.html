<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MedPlus Pharmacy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="login-left">
                <h1>Med<span>Plus</span></h1>
                <p>Your Trusted Online Pharmacy</p>
                <div class="features">
                    <div class="feature">
                        <span>✓</span> 100% Genuine Medicines
                    </div>
                    <div class="feature">
                        <span>✓</span> Free Home Delivery
                    </div>
                    <div class="feature">
                        <span>✓</span> 24/7 Customer Support
                    </div>
                </div>
                <div class="admin-info">
                    <p>Admin Login:</p>
                    <p class="admin-creds">admin@medplus.com / admin123</p>
                </div>
            </div>
            
            <div class="login-right">
                <h2>Welcome Back</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" value="admin@medplus.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" value="admin123" required>
                    </div>
                    
                    <button type="submit" class="btn-login">Login</button>
                </form>
                
                <p class="register-link">
                    Don't have account? 
                    <a href="register.html">Register</a>
                </p>
            </div>
        </div>
    </div>
    
    <script src="login.js"></script>
</body>
</html>
