                <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshMart | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
        
        <div class="h-2 bg-green-500"></div>

        <div class="p-8 md:p-10">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-black italic tracking-tighter text-green-600">
                    Fresh<span class="text-gray-800">Mart</span>
                </h1>
                <div class="mt-4">
                    <h2 class="text-2xl font-bold text-gray-800">Welcome Back</h2>
                    <p class="text-gray-500 mt-1">Login to manage your orders</p>
                </div>
            </div>

            <form id="login-form" class="space-y-5">
                <div class="space-y-1">
                    <label class="text-sm font-semibold text-gray-600 ml-1">Email Address</label>
                    <input type="email" id="logEmail" name="email" placeholder="name@example.com" 
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all" required>
                </div>

                <div class="space-y-1">
                    <label class="text-sm font-semibold text-gray-600 ml-1">Password</label>
                    <input type="password" id="logPass" name="password" placeholder="••••••••" 
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all" required>
                </div>

                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-green-100 transition-all active:scale-[0.98] mt-2">
                    Sign In
                </button>
            </form>

            <div class="mt-8 space-y-6 text-center">
                <p class="text-gray-600">
                    New user? <a href="register.html" class="text-green-600 font-bold hover:underline">Create an account</a>
                </p>
                
                <div class="pt-6 border-t border-gray-100">
                    <p class="text-sm text-gray-500 mb-3 font-medium uppercase tracking-wider">Staff Access</p>
                    <a href="admin.html" class="inline-flex items-center justify-center px-6 py-2 border-2 border-gray-200 rounded-full text-gray-600 font-semibold hover:bg-gray-50 hover:border-green-500 hover:text-green-600 transition-all text-sm">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04m14.506 0A11.977 11.977 0 0112 21.227a11.977 11.977 0 01-7.888-18.247M12 11V7"></path></svg>
                        Admin Portal
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('logEmail').value;
            const password = document.getElementById('logPass').value;

            // Simple visual feedback for user
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "Authenticating...";
            btn.disabled = true;

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem("userName", data.userName);
                    localStorage.setItem("userEmail", data.userEmail);
                    window.location.href = "index.html";
                } else {
                    alert(data.error || "Invalid login credentials");
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            } catch (err) {
                console.error("Login Error:", err);
                alert("Server connection failed!");
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
