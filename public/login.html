<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MedPlus Pharmacy</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-4xl w-full overflow-hidden">
        <div class="flex flex-col md:flex-row">
            <!-- Left Side -->
            <div class="bg-gradient-to-br from-emerald-800 to-emerald-600 text-white p-8 md:w-1/2">
                <h1 class="text-3xl font-bold mb-2">Med<span class="text-yellow-300">Plus</span></h1>
                <p class="text-emerald-100 mb-6">Your Trusted Online Pharmacy</p>
                <div class="space-y-4">
                    <div class="flex items-center gap-3">
                        <span class="w-8 h-8 bg-white bg-opacity-20 rounded-full flex items-center justify-center">✓</span>
                        <span>100% Genuine Medicines</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="w-8 h-8 bg-white bg-opacity-20 rounded-full flex items-center justify-center">✓</span>
                        <span>Free Home Delivery</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="w-8 h-8 bg-white bg-opacity-20 rounded-full flex items-center justify-center">✓</span>
                        <span>24/7 Customer Support</span>
                    </div>
                </div>
            </div>
            
            <!-- Right Side -->
            <div class="p-8 md:w-1/2">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">Welcome Back</h2>
                
                <form id="loginForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                        <input type="email" id="email" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600"
                            placeholder="your@email.com">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <input type="password" id="password" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600"
                            placeholder="••••••••">
                    </div>
                    
                    <button type="submit" 
                        class="w-full bg-emerald-700 text-white py-3 rounded-lg font-semibold hover:bg-emerald-800 transition">
                        Login
                    </button>
                </form>
                
                <p class="mt-4 text-center text-gray-600">
                    Don't have account? 
                    <a href="register.html" class="text-emerald-700 font-semibold hover:underline">Register</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-4 right-4 px-6 py-3 rounded-lg text-white transform translate-x-full transition-transform duration-300 z-50"></div>

    <script src="config.js"></script>
    <script src="login.js"></script>
</body>
</html>
