<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed - MedPlus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div class="container mx-auto px-4 py-8 max-w-2xl">
        <div class="bg-white rounded-lg shadow p-8 text-center">
            <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-check text-4xl text-green-600"></i>
            </div>
            
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Order Confirmed!</h1>
            <p class="text-gray-600 mb-6">Thank you for shopping with MedPlus</p>
            
            <div class="bg-gray-50 rounded-lg p-6 mb-6 text-left">
                <p class="text-sm text-gray-500 mb-2">Order ID</p>
                <p id="orderId" class="font-mono font-bold text-lg">#MED123456</p>
                
                <div class="border-t my-4"></div>
                
                <p class="text-sm text-gray-500 mb-2">What happens next?</p>
                <ul class="space-y-2 text-gray-700">
                    <li class="flex items-center gap-3">
                        <span class="w-6 h-6 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600 text-sm">1</span>
                        <span>Order received and will be processed soon</span>
                    </li>
                    <li class="flex items-center gap-3">
                        <span class="w-6 h-6 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600 text-sm">2</span>
                        <span>You'll receive SMS updates on order status</span>
                    </li>
                    <li class="flex items-center gap-3">
                        <span class="w-6 h-6 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600 text-sm">3</span>
                        <span>Delivery within 3-5 business days</span>
                    </li>
                </ul>
            </div>
            
            <div class="flex gap-4">
                <a href="index.html" class="flex-1 bg-emerald-700 text-white py-3 rounded-lg hover:bg-emerald-800 transition">
                    Continue Shopping
                </a>
                <a href="orders.html" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-lg hover:bg-gray-300 transition">
                    Track Order
                </a>
            </div>
        </div>
    </div>
    
    <script>
        // Get order ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('id');
        if (orderId) {
            document.getElementById('orderId').textContent = '#' + orderId.slice(-8);
        }
    </script>
</body>
</html>
