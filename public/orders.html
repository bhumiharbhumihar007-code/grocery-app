<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - MedPlus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow sticky top-0 z-40">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <h1 class="text-2xl font-bold text-emerald-700">Med<span class="text-amber-600">Plus</span></h1>
                <div class="flex items-center gap-4">
                    <span id="userGreeting" class="hidden md:inline text-gray-600"></span>
                    <a href="index.html" class="text-emerald-700 hover:text-emerald-800">
                        <i class="fas fa-store mr-2"></i>Shop
                    </a>
                    <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-lg text-sm hover:bg-red-600">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>
    
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">My Orders</h1>
        
        <div id="ordersList" class="space-y-4">
            <div class="text-center py-12">
                <i class="fas fa-spinner fa-spin text-4xl text-emerald-700"></i>
                <p class="mt-4 text-gray-500">Loading orders...</p>
            </div>
        </div>
    </div>
    
    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 px-6 py-3 rounded-lg text-white transform translate-x-full transition-transform duration-300 z-50"></div>
    
    <script>
        // Check if user is logged in
        const userName = localStorage.getItem("userName");
        const userEmail = localStorage.getItem("userEmail");
        
        if (!userName) {
            window.location.href = "login.html";
        }
        
        document.getElementById("userGreeting").textContent = `Hi, ${userName}`;
        
        // Load orders
        loadOrders();
        
        async function loadOrders() {
            try {
                const response = await fetch(`/orders/${userEmail}`);
                const orders = await response.json();
                
                displayOrders(orders);
            } catch (error) {
                showToast("Failed to load orders", "error");
                document.getElementById("ordersList").innerHTML = `
                    <div class="text-center py-12 text-red-500">
                        Failed to load orders. Please try again.
                    </div>
                `;
            }
        }
        
        function displayOrders(orders) {
            const container = document.getElementById("ordersList");
            
            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <i class="fas fa-box-open text-6xl text-gray-300 mb-4"></i>
                        <h3 class="text-xl font-bold text-gray-700 mb-2">No orders yet</h3>
                        <p class="text-gray-500 mb-6">Start shopping to place your first order</p>
                        <a href="index.html" class="inline-block bg-emerald-700 text-white px-8 py-3 rounded-lg hover:bg-emerald-800">
                            Browse Medicines
                        </a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = orders.map(order => `
                <div class="bg-white rounded-lg shadow overflow-hidden">
                    <div class="p-6">
                        <div class="flex flex-wrap justify-between items-start gap-4 mb-4">
                            <div>
                                <p class="text-sm text-gray-500">Order ID</p>
                                <p class="font-mono font-bold">#${order._id.slice(-8)}</p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-500">Order Date</p>
                                <p class="font-medium">${new Date(order.createdAt).toLocaleDateString()}</p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-500">Status</p>
                                <span class="inline-block px-3 py-1 rounded-full text-sm font-medium ${getStatusClass(order.status)}">
                                    ${order.status.toUpperCase()}
                                </span>
                            </div>
                            <div>
                                <p class="text-sm text-gray-500">Total</p>
                                <p class="text-xl font-bold text-emerald-700">₹${order.total}</p>
                            </div>
                        </div>
                        
                        <div class="border-t pt-4">
                            <p class="font-medium mb-2">Items</p>
                            <div class="space-y-2">
                                ${order.items.map(item => `
                                    <div class="flex justify-between text-sm">
                                        <span>${item.name} x ${item.quantity}</span>
                                        <span class="font-medium">₹${item.price * item.quantity}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <div class="border-t mt-4 pt-4">
                            <p class="text-sm text-gray-600">
                                <i class="fas fa-map-marker-alt mr-2 text-emerald-700"></i>
                                Delivery to: ${order.deliveryAddress}
                            </p>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function getStatusClass(status) {
            const classes = {
                'pending': 'bg-yellow-100 text-yellow-800',
                'processing': 'bg-blue-100 text-blue-800',
                'shipped': 'bg-purple-100 text-purple-800',
                'delivered': 'bg-green-100 text-green-800',
                'cancelled': 'bg-red-100 text-red-800'
            };
            return classes[status] || 'bg-gray-100 text-gray-800';
        }
        
        async function logout() {
            await fetch("/logout", { method: "POST" });
            localStorage.clear();
            window.location.href = "login.html";
        }
        
        function showToast(message, type) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.style.background = type === "success" ? "#059669" : "#dc2626";
            toast.classList.remove("translate-x-full");
            setTimeout(() => toast.classList.add("translate-x-full"), 3000);
        }
    </script>
</body>
</html>
