<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FreshMart | Register</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<script>
tailwind.config = {
theme:{
extend:{
colors:{
tealMain:"#004D4D",
sand:"#F5F2ED",
copper:"#B87333",
charcoal:"#2B2B2B"
}
}
}
}
</script>

<style>
body{font-family:'Inter',sans-serif;}
</style>

</head>


<body class="bg-sand min-h-screen flex items-center justify-center p-4 text-charcoal">

<div class="max-w-md w-full bg-white rounded-3xl shadow-xl border border-gray-200 overflow-hidden">

<div class="h-2 bg-tealMain"></div>

<div class="p-8 md:p-10">

<!-- BRAND -->

<div class="text-center mb-8">

<h1 class="text-3xl font-black text-tealMain">
Fresh<span class="text-copper">Mart</span>
</h1>

<h2 class="text-2xl font-bold mt-4">
Create Account
</h2>

<p class="text-gray-500">
Join our store today
</p>

</div>


<!-- REGISTER FORM -->

<form id="register-form" class="space-y-4">

<div>

<label class="text-sm font-semibold ml-1">
Full Name
</label>

<input
type="text"
id="regName"
placeholder="Enter your name"
class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-tealMain outline-none"
required>

</div>


<div>

<label class="text-sm font-semibold ml-1">
Email Address
</label>

<input
type="email"
id="regEmail"
placeholder="name@example.com"
class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-tealMain outline-none"
required>

</div>


<div>

<label class="text-sm font-semibold ml-1">
Password
</label>

<input
type="password"
id="regPass"
placeholder="Create a password"
class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-tealMain outline-none"
required>

</div>


<div class="flex items-center space-x-2 px-1 py-2">

<input
type="checkbox"
id="terms"
class="w-4 h-4 text-tealMain border-gray-300 rounded"
required>

<label for="terms" class="text-xs text-gray-500">

I agree to the
<span class="text-tealMain underline">Terms & Conditions</span>

</label>

</div>


<button
type="submit"
id="submit-btn"
class="w-full bg-copper text-white font-bold py-4 rounded-xl hover:opacity-90">

Register Now

</button>

</form>


<div class="mt-8 text-center">

<p>

Already have an account?

<a href="login.html"
class="text-tealMain font-bold hover:underline">

Login here

</a>

</p>

</div>

</div>

</div>



<script>

document.getElementById('register-form').addEventListener('submit', async (e)=>{

e.preventDefault();

const btn = document.getElementById("submit-btn");

const originalText = btn.innerText;

btn.innerText = "Creating Account...";
btn.disabled = true;

const userData = {

name: document.getElementById('regName').value,
email: document.getElementById('regEmail').value,
password: document.getElementById('regPass').value

};


if(userData.password.length < 6){

alert("Password must be at least 6 characters");

btn.innerText = originalText;
btn.disabled = false;

return;

}


try{

const res = await fetch('/register',{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body: JSON.stringify(userData)

});

const data = await res.json();

if(res.ok){

alert("Account created successfully!");

window.location.href = "login.html";

}else{

alert(data.error || "Registration failed");

btn.innerText = originalText;
btn.disabled = false;

}

}catch(err){

console.error(err);

alert("Server connection failed");

btn.innerText = originalText;
btn.disabled = false;

}

});

</script>


</body>
</html>
