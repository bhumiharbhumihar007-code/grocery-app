<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MedPlus</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full p-6">
            <h1 class="text-2xl font-bold text-[#004D4D] mb-6">Create Account</h1>
            
            <form id="registerForm">
                <input type="text" id="name" placeholder="Full Name" required
                    class="w-full border p-3 rounded mb-3">
                <input type="email" id="email" placeholder="Email" required
                    class="w-full border p-3 rounded mb-3">
                <input type="password" id="password" placeholder="Password" required minlength="6"
                    class="w-full border p-3 rounded mb-3">
                <input type="tel" id="phone" placeholder="Phone Number"
                    class="w-full border p-3 rounded mb-3">
                <textarea id="address" placeholder="Address" rows="2"
                    class="w-full border p-3 rounded mb-3"></textarea>
                
                <button type="submit" class="w-full bg-[#004D4D] text-white py-3 rounded-lg">
                    Register
                </button>
            </form>
            
            <p class="mt-4 text-center">
                Already have account? <a href="login.html" class="text-[#004D4D]">Login</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById("registerForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const user = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value,
                phone: document.getElementById("phone").value,
                address: document.getElementById("address").value
            };
            
            const res = await fetch("/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(user)
            });
            
            const data = await res.json();
            
            if (res.ok) {
                alert("Registration successful! Please login.");
                window.location.href = "login.html";
            } else {
                alert(data.error || "Registration failed");
            }
        });
    </script>
</body>
</html>
